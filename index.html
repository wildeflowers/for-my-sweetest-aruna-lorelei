<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>for nana ♡</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

background:
radial-gradient(circle at top,#2b3563 0%,#161b34 45%,#090b18 100%);

font-family:'Inter',sans-serif;

color:white;

}

/* stars */

.stars{

position:absolute;

width:100%;

height:100%;

background-image:

radial-gradient(white 1px,transparent 1px);

background-size:55px 55px;

opacity:.18;

animation:twinkle 5s ease-in-out infinite alternate;

}

@keyframes twinkle{

from{

opacity:.10;

}

to{

opacity:.28;

}

}

.card{

position:relative;

z-index:2;

width:90%;

max-width:650px;

padding:45px;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.08);

text-align:center;

animation:fade 1.8s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h1{

font-family:'Cormorant Garamond',serif;

font-size:58px;

font-weight:500;

margin-bottom:25px;

}

p{

font-size:17px;

line-height:2;

opacity:.82;

}

button{

margin-top:38px;

padding:15px 40px;

border-radius:999px;

border:none;

background:rgba(255,255,255,.12);

color:white;

font-size:16px;

letter-spacing:1px;

cursor:pointer;

transition:.35s;

}

button:hover{

transform:translateY(-4px);

background:rgba(255,255,255,.2);

box-shadow:0 0 30px rgba(255,255,255,.12);

}

small{

display:block;

margin-top:45px;

font-size:12px;

letter-spacing:1px;

opacity:.4;

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<h1>dear, nana.</h1>

<p>

before you continue,

there's one small favor i'd like to ask.

<br><br>

please put on your earphones,

take your time,

and don't rush through any page.

<br><br>

this little place

was made only for you.

</p>

<button onclick="location.href='page2.html'">

i'm ready.

</button>

<small>

made with every song

i couldn't explain.

</small>

</div>

</body>

</html>
